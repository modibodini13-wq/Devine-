<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Juste Prix — Devine le Nombre</title>
<style>
  :root {
    --gold: #d4a940;
    --gold-bright: #f2c94c;
    --curtain: #7a1e2b;
    --curtain-dark: #4d1019;
    --cream: #f6ecd9;
    --ink: #241208;
    --win: #3f8f5f;
    --lose: #b3402f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', 'Times New Roman', serif;
    background:
      radial-gradient(ellipse at top, #5c1520 0%, var(--curtain-dark) 60%, #2a0a10 100%);
    color: var(--ink);
    padding: 24px;
  }

  .stage {
    width: 100%;
    max-width: 480px;
    background: var(--cream);
    border-radius: 18px;
    border: 6px solid var(--gold);
    box-shadow:
      0 0 0 2px var(--curtain-dark),
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 0 40px rgba(212,169,64,0.15);
    padding: 32px 28px 28px;
    position: relative;
    overflow: hidden;
  }

  .stage::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 10px;
    background: repeating-linear-gradient(
      90deg, var(--gold-bright) 0 14px, transparent 14px 28px
    );
    opacity: 0.6;
  }

  .marquee {
    text-align: center;
    margin-bottom: 4px;
  }

  .marquee .eyebrow {
    display: block;
    font-family: 'Trebuchet MS', sans-serif;
    letter-spacing: 0.35em;
    font-size: 0.7rem;
    color: var(--curtain);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-size: 2.1rem;
    margin: 0 0 4px;
    text-align: center;
    color: var(--curtain);
    text-shadow: 1px 1px 0 var(--gold-bright);
    letter-spacing: 0.02em;
  }

  .subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #6b5a3a;
    margin: 0 0 22px;
    font-style: italic;
  }

  .rules {
    background: rgba(212,169,64,0.15);
    border: 1px dashed var(--gold);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.82rem;
    color: #5a4522;
    margin-bottom: 20px;
    text-align: center;
  }

  .display-panel {
    background: var(--curtain-dark);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .display-panel span {
    font-family: 'Trebuchet MS', sans-serif;
    color: var(--gold-bright);
    font-size: 1.05rem;
    letter-spacing: 0.02em;
  }

  .display-panel.win span { color: #a9e8bd; }
  .display-panel.lose span { color: #f0a898; }

  form {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  input[type="number"] {
    flex: 1;
    padding: 12px 14px;
    font-size: 1.1rem;
    border-radius: 8px;
    border: 2px solid var(--gold);
    background: #fffdf6;
    color: var(--ink);
    font-family: inherit;
    text-align: center;
  }

  input[type="number"]:focus {
    outline: 3px solid var(--curtain);
    outline-offset: 1px;
  }

  button {
    font-family: 'Trebuchet MS', sans-serif;
    font-weight: bold;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    cursor: pointer;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    color: var(--curtain-dark);
    transition: transform 0.08s ease, box-shadow 0.15s ease;
  }

  button:hover { box-shadow: 0 4px 12px rgba(212,169,64,0.5); }
  button:active { transform: translateY(1px); }
  button:focus-visible { outline: 3px solid var(--curtain); outline-offset: 2px; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 0.85rem;
    color: #6b5a3a;
    margin-bottom: 18px;
  }

  .meta-row strong { color: var(--curtain); }

  .replay {
    display: none;
    width: 100%;
    background: linear-gradient(180deg, var(--win), #2e6f47);
    color: #fff;
    font-size: 1rem;
    padding: 13px;
    margin-top: 4px;
  }

  .replay.show { display: block; }

  @media (prefers-reduced-motion: no-preference) {
    .display-panel.pulse { animation: pulse 0.35s ease; }
  }
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<main class="stage">
  <div class="marquee">
    <span class="eyebrow">Emission spéciale</span>
    <h1>Le Juste Prix</h1>
  </div>
  <p class="subtitle">Devinez le nombre mystère avant d'être à court d'essais.</p>

  <p class="rules" id="rules">Un nombre entre <strong>1</strong> et <strong>100</strong> a été choisi. Vous avez <strong id="maxTriesLabel">10</strong> essais.</p>

  <div class="display-panel" id="displayPanel">
    <span id="message">Entrez un nombre pour commencer.</span>
  </div>

  <form id="guessForm">
    <input type="number" id="guessInput" min="1" max="100" placeholder="Votre nombre" required autocomplete="off">
    <button type="submit">Valider</button>
  </form>

  <div class="meta-row">
    <span>Essais restants : <strong id="triesLeft">10</strong></span>
    <span>Dernier écart : <strong id="lastGap">—</strong></span>
  </div>

  <button type="button" class="replay" id="replayBtn">Nouvelle partie</button>
</main>

<script>
  const MIN = 1;
  const MAX = 100;
  const MAX_TRIES = 10;

  let secretNumber = generateSecret();
  let triesLeft = MAX_TRIES;
  let gameOver = false;

  const form = document.getElementById('guessForm');
  const input = document.getElementById('guessInput');
  const message = document.getElementById('message');
  const displayPanel = document.getElementById('displayPanel');
  const triesLeftEl = document.getElementById('triesLeft');
  const lastGapEl = document.getElementById('lastGap');
  const replayBtn = document.getElementById('replayBtn');

  function generateSecret() {
    return Math.floor(Math.random() * (MAX - MIN + 1)) + MIN;
  }

  function setMessage(text, state) {
    message.textContent = text;
    displayPanel.classList.remove('win', 'lose', 'pulse');
    if (state) displayPanel.classList.add(state);
    void displayPanel.offsetWidth;
    displayPanel.classList.add('pulse');
  }

  function endGame(didWin) {
    gameOver = true;
    input.disabled = true;
    form.querySelector('button').disabled = true;
    replayBtn.classList.add('show');
    if (!didWin) {
      setMessage(`Perdu. Le nombre était ${secretNumber}.`, 'lose');
    }
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (gameOver) return;

    const value = Number(input.value);

    if (!Number.isInteger(value) || value < MIN || value > MAX) {
      setMessage(`Entrez un nombre entier entre ${MIN} et ${MAX}.`, 'lose');
      return;
    }

    triesLeft -= 1;
    triesLeftEl.textContent = triesLeft;
    const gap = Math.abs(secretNumber - value);
    lastGapEl.textContent = gap;

    if (value === secretNumber) {
      setMessage(`Exact ! Le nombre était bien ${secretNumber}.`, 'win');
      endGame(true);
      return;
    }

    if (triesLeft <= 0) {
      endGame(false);
      return;
    }

    const direction = value < secretNumber ? 'plus grand' : 'plus petit';
    let proximity = 'Vous êtes loin.';
    if (gap <= 3) proximity = 'Vous brûlez !';
    else if (gap <= 10) proximity = 'Vous chauffez.';
    else if (gap <= 25) proximity = 'Vous êtes tiède.';

    setMessage(`Le nombre mystère est ${direction}. ${proximity}`, null);
    input.value = '';
    input.focus();
  });

  replayBtn.addEventListener('click', function () {
    secretNumber = generateSecret();
    triesLeft = MAX_TRIES;
    gameOver = false;
    triesLeftEl.textContent = triesLeft;
    lastGapEl.textContent = '—';
    input.disabled = false;
    input.value = '';
    form.querySelector('button').disabled = false;
    replayBtn.classList.remove('show');
    setMessage('Entrez un nombre pour commencer.', null);
    input.focus();
  });
</script>

</body>
</html>
